<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Payment Tracker</title>
<style>
  :root {
    --bg: #121212;
    --panel: #1c1c1e;
    --panel2: #232326;
    --border: #2e2e31;
    --text: #e8e8e8;
    --muted: #9a9a9e;
    --accent: #4f8ef7;
    --good: #3ecf8e;
    --bad: #f76c6c;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 20px;
  }
  h1 {
    font-size: 20px;
    margin: 0 0 4px 0;
  }
  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 0 0 12px 0;
  }
  .row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .row label {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  input {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 14px;
    width: 100%;
  }
  input:focus { outline: 1px solid var(--accent); }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .stat {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat .label { font-size: 12px; color: var(--muted); }
  .stat .value { font-size: 18px; font-weight: 600; margin-top: 2px; }
  .value.good { color: var(--good); }
  .value.bad { color: var(--bad); }

  .progress-bar {
    background: var(--panel2);
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
    margin-top: 10px;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: var(--good);
    transition: width 0.2s ease;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    text-align: left;
    padding: 8px 6px;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  td input {
    padding: 6px 8px;
    font-size: 14px;
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--bad);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
  }
  .add-btn, .save-note {
    background: var(--accent);
    border: none;
    color: white;
    padding: 9px 14px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 6px;
  }
  .add-btn:hover { opacity: 0.9; }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 16px;
  }
</style>
</head>
<body>

<h1>Trip Payment Tracker</h1>
<div class="sub">Track deposit + final payment vs what everyone has paid you back.</div>

<div class="card">
  <h2>Accommodation Cost</h2>
  <div class="row">
    <label>Deposit already paid (by you)
      <input type="number" id="deposit" placeholder="0.00" step="0.01">
    </label>
    <label>Second/final payment (still due)
      <input type="number" id="finalPayment" placeholder="0.00" step="0.01">
    </label>
  </div>
</div>

<div class="card">
  <h2>Summary</h2>
  <div class="summary-grid">
    <div class="stat">
      <div class="label">Total accommodation cost</div>
      <div class="value" id="totalCost">R0.00</div>
    </div>
    <div class="stat">
      <div class="label">Total you're owed</div>
      <div class="value" id="totalOwed">R0.00</div>
    </div>
    <div class="stat">
      <div class="label">Collected so far</div>
      <div class="value good" id="totalCollected">R0.00</div>
    </div>
    <div class="stat">
      <div class="label">Still outstanding</div>
      <div class="value bad" id="stillOwed">R0.00</div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="card">
  <h2>People</h2>
  <table>
    <thead>
      <tr><th>Name</th><th>Owes</th><th>Paid</th><th>Remaining</th><th></th></tr>
    </thead>
    <tbody id="peopleBody"></tbody>
  </table>
  <button class="add-btn" onclick="addPerson()">+ Add person</button>
  <button class="add-btn" style="background:var(--panel2); border:1px solid var(--border); margin-left:8px;" onclick="splitEvenly()">Split total cost evenly</button>
  <div class="status" id="statusMsg"></div>
  <div class="status" id="mismatchMsg" style="color:var(--bad);"></div>
</div>

<script>
let people = [];

function loadData() {
  try {
    const raw = localStorage.getItem('tracker-data');
    if (raw) {
      const data = JSON.parse(raw);
      people = data.people || [];
      document.getElementById('deposit').value = data.deposit ?? '';
      document.getElementById('finalPayment').value = data.finalPayment ?? '';
    }
  } catch (e) {
    // no saved data yet
  }
  render();
}

function saveData() {
  const data = {
    people,
    deposit: document.getElementById('deposit').value,
    finalPayment: document.getElementById('finalPayment').value
  };
  try {
    localStorage.setItem('tracker-data', JSON.stringify(data));
    const el = document.getElementById('statusMsg');
    el.textContent = 'Saved';
    setTimeout(() => { el.textContent = ''; }, 1000);
  } catch (e) {
    document.getElementById('statusMsg').textContent = 'Save failed - try again';
  }
}

function addPerson() {
  people.push({ name: '', owes: 0, paid: 0 });
  render();
  saveData();
}

function splitEvenly() {
  const deposit = parseFloat(document.getElementById('deposit').value) || 0;
  const finalPayment = parseFloat(document.getElementById('finalPayment').value) || 0;
  const totalCost = deposit + finalPayment;
  const count = people.length;
  if (count === 0) {
    alert('Add at least one person first.');
    return;
  }
  const share = Math.round((totalCost / count) * 100) / 100;
  people.forEach((p, idx) => {
    p.owes = share;
  });
  // adjust last person for rounding remainder so shares add up exactly
  const sumSoFar = share * (count - 1);
  people[count - 1].owes = Math.round((totalCost - sumSoFar) * 100) / 100;
  render();
  saveData();
}

function removePerson(idx) {
  people.splice(idx, 1);
  render();
  saveData();
}

function updatePerson(idx, field, value) {
  if (field === 'name') {
    people[idx].name = value;
  } else {
    people[idx][field] = parseFloat(value) || 0;
  }
  render();
  saveData();
}

function fmt(n) {
  return 'R' + (Math.round(n * 100) / 100).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function render() {
  const tbody = document.getElementById('peopleBody');
  tbody.innerHTML = '';
  people.forEach((p, idx) => {
    const remaining = (p.owes || 0) - (p.paid || 0);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${p.name}" placeholder="Name" onchange="updatePerson(${idx},'name',this.value)"></td>
      <td><input type="number" step="0.01" value="${p.owes}" onchange="updatePerson(${idx},'owes',this.value)"></td>
      <td><input type="number" step="0.01" value="${p.paid}" onchange="updatePerson(${idx},'paid',this.value)"></td>
      <td style="color:${remaining > 0 ? 'var(--bad)' : 'var(--good)'}">${fmt(remaining)}</td>
      <td><button class="del-btn" onclick="removePerson(${idx})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  renderSummary();
}

function renderSummary() {
  const deposit = parseFloat(document.getElementById('deposit').value) || 0;
  const finalPayment = parseFloat(document.getElementById('finalPayment').value) || 0;
  const totalCost = deposit + finalPayment;
  const totalOwed = people.reduce((sum, p) => sum + (p.owes || 0), 0);
  const totalCollected = people.reduce((sum, p) => sum + (p.paid || 0), 0);
  const stillOwed = totalOwed - totalCollected;

  document.getElementById('totalCost').textContent = fmt(totalCost);
  document.getElementById('totalOwed').textContent = fmt(totalOwed);
  document.getElementById('totalCollected').textContent = fmt(totalCollected);
  document.getElementById('stillOwed').textContent = fmt(stillOwed > 0 ? stillOwed : 0);

  const pct = totalOwed > 0 ? Math.min(100, (totalCollected / totalOwed) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';

  const mismatchEl = document.getElementById('mismatchMsg');
  const diff = Math.round((totalCost - totalOwed) * 100) / 100;
  if (Math.abs(diff) > 0.01 && people.length > 0) {
    if (diff > 0) {
      mismatchEl.textContent = `Heads up: the amounts people owe only add up to ${fmt(totalOwed)}, which is ${fmt(diff)} short of the full accommodation cost (${fmt(totalCost)}). Check your "Owes" column includes both the deposit and final payment shares.`;
    } else {
      mismatchEl.textContent = `Heads up: the amounts people owe add up to ${fmt(totalOwed)}, which is ${fmt(-diff)} more than the full accommodation cost (${fmt(totalCost)}).`;
    }
  } else {
    mismatchEl.textContent = '';
  }
}

document.getElementById('deposit').addEventListener('input', () => { renderSummary(); saveData(); });
document.getElementById('finalPayment').addEventListener('input', () => { renderSummary(); saveData(); });

loadData();
</script>
</body>
</html>
